<h1 class="text-2xl font-bold mb-4">📊 Booking Reports</h1>

<div class="grid grid-cols-3 gap-6 mb-6">

  <div class="bg-green-100 p-4 rounded shadow">
    <h2 class="text-lg font-semibold">Approved</h2>
    <p class="text-2xl font-bold text-green-700">{{ approved }}</p>
  </div>

  <div class="bg-red-100 p-4 rounded shadow">
    <h2 class="text-lg font-semibold">Declined</h2>
    <p class="text-2xl font-bold text-red-700">{{ declined }}</p>
  </div>

  <!-- <div class="bg-yellow-100 p-4 rounded shadow">
    <h2 class="text-lg font-semibold">Cancelled</h2>
    <p class="text-2xl font-bold text-yellow-700">{{ Cancelled }}</p>
  </div> -->

</div>


<h2 class="text-xl font-semibold mb-2">Approved Booking Details</h2>

<table class="min-w-full border border-gray-300">
  <thead class="bg-gray-100">
    <tr>
      <th class="border px-4 py-2">User</th>
      <th class="border px-4 py-2">Flat Number</th>
      <th class="border px-4 py-2">Type</th>
      <th class="border px-4 py-2">Location</th>
    </tr>
  </thead>

  <tbody>
    <tr *ngFor="let booking of approvedBookings">
      <td class="border px-4 py-2">👤 {{ booking.user_name }}</td>
      <td class="border px-4 py-2">🏠 {{ booking.flat_number }}</td>
      <td class="border px-4 py-2">{{ booking.flat_type }}</td>
      <td class="border px-4 py-2">{{ booking.location }}</td>
    </tr>
  </tbody>
</table>
