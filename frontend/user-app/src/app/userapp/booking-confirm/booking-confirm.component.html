<div class="max-w-4xl mx-auto p-6">

  <!-- Loading -->
  <div *ngIf="loading" class="text-center text-gray-500 text-lg">
    ⏳ Loading flat details...
  </div>

  <!-- Error -->
  <div *ngIf="errorMsg" class="text-center text-red-500 text-lg">
    ❌ {{ errorMsg }}
  </div>

  <!-- Flat Card -->
  <div *ngIf="!loading && flat" class="bg-white shadow-xl rounded-2xl overflow-hidden">

    <img
      [src]="flat?.image"
      class="w-full h-80 object-cover"
    />

    <div class="p-6">

      <h2 class="text-3xl font-bold mb-2">
        🏠 Flat {{ flat?.flat_number }}
        <span class="text-xl text-gray-600">
          {{ flat?.flat_type }}
        </span>
      </h2>

      <p class="text-gray-700 text-lg">📍 {{ flat?.location }}</p>
      <p class="text-gray-700 text-lg">🏢 Tower: {{ flat?.tower_name }}</p>
      <p class="text-gray-700 text-lg mb-4">🏠 Floor: {{ flat?.floor }}</p>

      <p class="text-2xl font-semibold text-gray-900 mb-4">
        💰 ₹{{ flat?.price }}
      </p>

      <!-- Amenities -->
      <div *ngIf="flat?.amenities?.length" class="mb-6">

        <h3 class="font-semibold text-lg mb-2">
          ✨ Amenities
        </h3>

        <ul class="list-disc pl-5 text-gray-600">
          <li *ngFor="let amenity of flat?.amenities">
            {{ amenity }}
          </li>
        </ul>

      </div>

      <!-- Buttons -->
      <div class="flex gap-4">

        <button
          (click)="confirmBooking()"
          [disabled]="flat?.is_booked"
          class="text-white px-6 py-3 rounded-xl w-full transition
          {{ flat?.is_booked ? 'bg-red-600 cursor-not-allowed' : 'bg-green-600 hover:bg-green-700' }}"
        >
          {{ flat?.is_booked ? 'Already Booked' : 'Confirm Booking' }}
        </button>

        <button
          routerLink="/flats"
          class="bg-gray-500 text-white px-6 py-3 rounded-xl hover:bg-gray-600 w-full"
        >
          Cancel
        </button>

      </div>

    </div>
  </div>

</div>
