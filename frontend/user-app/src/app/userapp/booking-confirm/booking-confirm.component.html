<div class="max-w-4xl mx-auto p-6" *ngIf="flat">

  <div *ngIf="loading" class="text-center text-gray-500">Loading flat details...</div>
  <div *ngIf="errorMsg" class="text-center text-red-500">{{ errorMsg }}</div>

  <div class="bg-white shadow-lg rounded-xl overflow-hidden">
    <img [src]="flat?.image" [alt]="flat?.title" class="w-full h-80 object-cover" />

    <div class="p-6">
      <h2 class="text-2xl font-bold mb-2">{{ flat?.title }}</h2>
      <p class="text-gray-600 mb-2">📍 {{ flat?.location }}</p>
      <p class="text-gray-600 mb-2">🏢 Tower: {{ flat?.tower_name }}</p>
      <p class="text-gray-600 mb-4">🏠 Floor: {{ flat?.floor }}</p>
      <p class="text-xl font-semibold text-gray-800 mb-4">₹{{ flat?.price }}</p>

      <div *ngIf="flat?.amenities?.length > 0" class="mb-4">
        <h3 class="font-semibold mb-2">Amenities:</h3>
        <ul class="list-disc pl-5 text-gray-600">
          <li *ngFor="let amenity of flat?.amenities">{{ amenity }}</li>
        </ul>
      </div>

      <div class="flex gap-4">
        <button
  (click)="confirmBooking()"
  [disabled]="flat?.is_booked"
  [ngClass]="{
    'bg-green-600 hover:bg-green-700': !flat?.is_booked,
    'bg-red-600 cursor-not-allowed': flat?.is_booked
  }"
  class="text-white px-6 py-3 rounded transition"
>
  {{ flat?.is_booked ? 'Already Booked' : 'Confirm Booking' }}
</button>

        <button routerLink="/flats" class="bg-gray-500 text-white px-6 py-3 rounded hover:bg-gray-600 transition">
          Cancel
        </button>
      </div>
    </div>
  </div>
</div>
