<div class="max-w-7xl mx-auto p-6">

<!-- Page Header -->
<div class="mb-8">

  <!-- Centered Heading -->
  <h1 class="text-4xl font-bold text-center mb-4">Available Flats</h1>

  <!-- Button below, right aligned -->
  <div class="flex justify-end">
    <button 
      routerLink="/my-bookings"
      class="bg-blue-600 text-white px-6 py-3 rounded hover:bg-blue-700 transition">
      View My Bookings
    </button>
  </div>

</div>

<div class="mb-6">
  <select 
    [(ngModel)]="selectedTower" 
    (change)="filterFlats()"
    class="border p-2 rounded">

    <option value="">All Towers</option>
    <option *ngFor="let tower of towers" [value]="tower">
      {{ tower }}
    </option>

  </select>
</div>



  <!-- Loading -->
  <div *ngIf="loading" class="text-center text-gray-500 text-lg">
    Loading flats...
  </div>

  <!-- Error -->
  <div *ngIf="errorMsg" class="text-center text-red-500 text-lg">
    {{ errorMsg }}
  </div>

  <!-- Flats Grid -->
  <div *ngIf="flats.length > 0 && !loading" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
    <div *ngFor="let flat of flats" class="bg-white shadow-xl rounded-2xl overflow-hidden">

      <img [src]="flat?.image" [alt]="flat?.title" class="w-full h-80 object-cover" />

      <div class="p-6">
        <h2 class="text-2xl font-bold mb-2">{{ flat?.title }}</h2>
        <p class="text-gray-700 mb-1 text-lg">📍 {{ flat?.location }}</p>
        <p class="text-gray-700 mb-1 text-lg">🏢 Tower: {{ flat?.tower_name }}</p>
        <p class="text-gray-700 mb-2 text-lg">🏠 Floor: {{ flat?.floor }}</p>
        <p class="text-2xl font-semibold text-gray-900 mb-3">₹{{ flat?.price }}</p>

        <div *ngIf="flat?.amenities?.length > 0" class="mb-4">
          <h3 class="font-semibold mb-2 text-lg">Amenities:</h3>
          <ul class="list-disc pl-6 text-gray-700 text-base">
            <li *ngFor="let amenity of flat?.amenities">{{ amenity }}</li>
          </ul>
        </div>

<!-- BOOK NOW -->
<a 
  *ngIf="flat?.booking_status === null"
  [routerLink]="['/booking-confirm', flat?.id]"
  class="bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded transition">
  Book Now
</a>

<!-- WAIT APPROVAL -->
<button 
  *ngIf="flat?.booking_status === 'pending'"
  class="bg-yellow-600 text-white px-6 py-3 rounded cursor-not-allowed">
  Wait until admin approves
</button>

<!-- ALREADY BOOKED -->
<button 
  *ngIf="flat?.booking_status === 'approved'"
  class="bg-red-600 text-white px-6 py-3 rounded cursor-not-allowed">
  Already Booked
</button>
      </div>
    </div>
  </div>

  <!-- No Flats -->
  <div *ngIf="flats.length === 0 && !loading" class="text-center text-gray-500 text-lg">
    No flats available at the moment.
  </div>

</div>
