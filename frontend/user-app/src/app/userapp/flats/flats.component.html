<div class="max-w-7xl mx-auto p-6">

  <!-- Page Header -->
  <div class="mb-8">

    <!-- Centered Heading -->
    <h1 class="text-4xl font-bold text-center mb-4">Available Flats</h1>

    <!-- Button below, right aligned -->
    <div class="flex justify-end">
      <button 
        routerLink="/my-bookings"
        class="bg-blue-600 text-white px-6 py-3 rounded hover:bg-blue-700 transition">
        View My Bookings
      </button>
    </div>

  </div>

  <!-- Filters -->
  <div class="mb-6 flex gap-4">

    <!-- Tower -->
    <select 
      [(ngModel)]="selectedTower" 
      (change)="filterFlats()"
      class="border p-2 rounded">
      <option value="">All Towers</option>
      <option *ngFor="let tower of towers" [value]="tower">
        {{ tower }}
      </option>
    </select>

    <!-- Location -->
    <select 
      [(ngModel)]="selectedLocation" 
      (change)="filterFlats()"
      class="border p-2 rounded">
      <option value="">All Locations</option>
      <option *ngFor="let location of locations" [value]="location">
        {{ location }}
      </option>
    </select>

    <!-- Price -->
    <select 
      [(ngModel)]="selectedPriceRange" 
      (change)="filterFlats()"
      class="border p-2 rounded">
      <option value="">All Prices</option>
      <option *ngFor="let range of priceRanges" [value]="range">
        {{ range }}
      </option>
    </select>

  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="text-center text-gray-500 text-lg">
    Loading flats...
  </div>

  <!-- Error -->
  <div *ngIf="errorMsg" class="text-center text-red-500 text-lg">
    {{ errorMsg }}
  </div>

  <!-- Flats Grid -->
  <div *ngIf="flats.length > 0 && !loading" 
       class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">

     <div *ngFor="let flat of flats" 
     class="bg-white shadow-xl rounded-2xl overflow-hidden flex flex-col h-full hover:shadow-2xl transition">

  <img 
  [src]="flat?.image" 
  class="w-full h-72 object-cover" 
  style="aspect-ratio: 4/3;" />

   <div class="p-6 flex flex-col h-full">

    <!-- Flat Number + Type -->
    <h2 class="text-2xl font-bold mb-2">
      🏠 Flat {{ flat?.flat_number }} 
      <span class="text-lg font-medium text-gray-600">
        {{ flat?.flat_type }}
      </span>
    </h2>

    <p class="text-gray-700 mb-1 text-lg">
      📍 {{ flat?.location }}
    </p>

    <p class="text-gray-700 mb-1 text-lg">
      🏢 Tower: {{ flat?.tower_name }}
    </p>

    <p class="text-gray-700 mb-2 text-lg">
      📍 Floor: {{ flat?.floor }}
    </p>

    <p class="text-2xl font-semibold text-gray-900 mb-3">
      💰 ₹{{ flat?.price }}
    </p>

    <!-- Amenities -->
    <div *ngIf="flat?.amenities?.length > 0" class="mb-4">
      <h3 class="font-semibold mb-2 text-lg">✨ Amenities:</h3>
      <ul class="list-disc pl-6 text-gray-700 text-base">
        <li *ngFor="let amenity of flat?.amenities">
          {{ amenity }}
        </li>
      </ul>
    </div>

        </div>


    <!-- Booking Buttons -->
    <div class="px-6 py-3 rounded transition mx-auto">

  <button
    *ngIf="flat?.booking_status === null"
    (click)="confirmBooking(flat.id)"
    class="bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded transition w-full">
    Book Now
  </button>

  <button 
    *ngIf="flat?.booking_status === 'pending'"
    class="bg-yellow-600 text-white px-6 py-3 rounded cursor-not-allowed w-full">
    Wait until admin approves
  </button>

  <button 
    *ngIf="flat?.booking_status === 'approved'"
    class="bg-red-600 text-white px-6 py-3 rounded cursor-not-allowed w-full">
    Already Booked
  </button>

</div>

  </div>
  
  </div>


  <!-- No Flats -->
  <div *ngIf="flats.length === 0 && !loading" 
       class="text-center text-gray-500 text-lg">
    No flats available at the moment.
  </div>

</div>
