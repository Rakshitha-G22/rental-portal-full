<div class="flex justify-end p-4">
  <button routerLink="/flats"
          class="bg-gray-600 text-white px-4 py-2 rounded hover:bg-gray-700 transition">
    ← Back to Flats
  </button>
</div>

<div *ngIf="loading" class="text-center py-8 text-gray-500">
  Loading bookings...
</div>

<div *ngIf="!loading && msg" class="text-center py-8 text-gray-500">
  {{ msg }}
</div>

<div *ngIf="!loading && bookings.length > 0"
     class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 p-4">

  <div *ngFor="let b of bookings"
       class="border rounded-xl shadow-lg overflow-hidden flex flex-col bg-white">

    <!-- Flat Image -->
    <img [src]="b.flat_image"
         [alt]="b.flat_title"
         class="w-full h-64 object-cover"/>

    <div class="p-4 flex-1 flex flex-col justify-between">

      <div>

        <!-- Title -->
        <h3 class="text-xl font-bold mb-2">
          🏠 {{ b.flat_title }}
        </h3>

        <!-- Location -->
        <p class="text-gray-600 mb-1">
          📍 <strong>Location:</strong> {{ b.flat_location }}
        </p>

        <!-- Price -->
        <p class="text-gray-800 font-semibold mb-2">
          💰 ₹{{ b.flat_price }}
        </p>

        <!-- Amenities -->
        <p class="text-gray-700 mb-2">
          🛠 <strong>Amenities:</strong>
          <span *ngIf="b.amenities && b.amenities.length > 0; else noAmenities">
            <span *ngFor="let a of b.amenities; let i = index">
              {{ a }}<span *ngIf="i < b.amenities.length - 1">, </span>
            </span>
          </span>
          <ng-template #noAmenities>
            Not Available
          </ng-template>
        </p>

        <!-- Status -->
        <p class="mb-1">
          📌 <strong>Status:</strong>
          <span
            [ngClass]="b.status === 'Cancelled'
              ? 'text-red-600 font-semibold'
              : 'text-green-600 font-semibold'">
            {{ b.status }}
          </span>
        </p>

        <!-- Booking Date -->
        <p class="text-gray-500 mb-4">
          📅 Booked On:
          {{ b.booked_on | date:'dd-MM-yyyy HH:mm' }}
        </p>

      </div>

      <!-- Cancel Button -->
      <button
        *ngIf="b.status !== 'Cancelled'"
        (click)="cancel(b)"
        class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700 transition mb-2">
        ❌ Cancel Booking
      </button>

      <!-- Cancelled Button -->
      <button
        *ngIf="b.status === 'Cancelled'"
        disabled
        class="bg-gray-400 text-white px-4 py-2 rounded cursor-not-allowed mb-2">
        🚫 Booking Cancelled
      </button>

      <!-- Download Receipt -->
      <button (click)="downloadPDF(b.id)"
              class="bg-blue-500 text-white py-2 px-4 rounded hover:bg-blue-600 transition">
        📄 Download Receipt
      </button>

    </div>

  </div>

</div>
